<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#121212"/>

  <!-- Decorative gradient circle -->
  <circle cx="900" cy="315" r="300" fill="#00B37E" opacity="0.1"/>
  <circle cx="300" cy="315" r="200" fill="#00B37E" opacity="0.05"/>

  <!-- Logo area -->
  <rect x="80" y="180" width="80" height="80" rx="12" fill="#00B37E"/>
  <text x="120" y="235" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#121212" text-anchor="middle">B</text>

  <!-- Brand name -->
  <text x="180" y="235" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF">BoletaPro</text>

  <!-- Main headline -->
  <text x="120" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">Emite Boletas BHE y BHT</text>
  <text x="120" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">ante el SII de Chile</text>

  <!-- Highlight text -->
  <text x="120" y="470" font-family="Arial, sans-serif" font-size="28" fill="#00B37E">Carga tu Excel. Emite en segundos.</text>

  <!-- CTA button -->
  <rect x="120" y="500" width="200" height="50" rx="8" fill="#00B37E"/>
  <text x="220" y="533" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#121212" text-anchor="middle">Empieza Gratis →</text>
</svg>